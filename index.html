<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graduation Surprise</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#fdfaf7] min-h-screen flex items-center justify-center p-6">

  <div class="max-w-4xl w-full bg-white rounded-[32px] shadow-2xl overflow-hidden grid md:grid-cols-2">
    
    <!-- Foto -->
    <div class="bg-gradient-to-b from-pink-100 to-purple-100 flex items-center justify-center p-8">
      <img 
        src="ulfi.png" 
        alt="Graduation Photo"
        class="w-[280px] md:w-[320px] rounded-[24px] shadow-lg object-cover"
      />
    </div>

    <!-- Content -->
    <div class="flex flex-col justify-center p-10 md:p-14">
      <span class="text-pink-500 font-semibold tracking-wide mb-3">
        🎓 Graduation Day
      </span>

      <h1 class="text-4xl md:text-5xl font-bold leading-tight mb-6 text-gray-800">
        Congratulations!
      </h1>

      <p class="text-gray-600 text-lg leading-8 mb-8">
       Ulfi Nurlaila S.M✨
        <br><br>
Proud of you<br>
Hopefully, with your S.M. degree, you can continue to grow and achieve great achievements. Good luck in your life after graduation.
      </p>

      <button class="w-fit px-6 py-3 rounded-full bg-gradient-to-r from-pink-500 to-purple-500 text-white font-medium shadow-md hover:scale-105 transition duration-300">
        Proud Of You 🌸
      </button>
    </div>

  </div>

</body>
</html>
